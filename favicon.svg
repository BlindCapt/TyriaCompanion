<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7209b7" />
      <stop offset="100%" stop-color="#4cc9f0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background with page theme color -->
  <rect width="512" height="512" rx="140" fill="#0b0b0e" stroke="#22222d" stroke-width="20" />
  
  <!-- Stylized geometric dragon emblem -->
  <path d="M256 90 L380 200 L320 230 L390 350 L256 290 L122 350 L192 230 L132 200 Z" fill="url(#grad)" filter="url(#glow)" />
  <path d="M256 140 L330 210 L290 230 L330 310 L256 270 L182 310 L222 230 L182 210 Z" fill="#0b0b0e" />
  <circle cx="256" cy="256" r="20" fill="url(#grad)" filter="url(#glow)" />
</svg>
